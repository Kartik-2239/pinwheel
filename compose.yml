services:
  pinwheel:
    build: .
    env_file:
      - .env
    depends_on:
      pinwheel-db:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://user:pass@pinwheel-db:5432/pinwheel-db?sslmode=disable
  
  pinwheel-db:
    image: postgres:18.4-alpine3.24
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: pinwheel-db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pinwheel-db"]
      interval: 2s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"